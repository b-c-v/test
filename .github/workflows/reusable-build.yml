---
# .github/workflows/reusable-build.yml (вызываемый workflow)
name: Any Reusable Build
on:
  workflow_call: # делает этот workflow reusable, чтобы его можно было вызывать из других workflow
    inputs: # входные переменные, передаваемые из вызывающего workflow
      node_version_var: # имя переменной
        required: true # обязательная переменная
        type: string
      environment_var:
        description: "Target deployment environment (e.g., staging, production)"
        required: false # необязательная переменная
        type: string
        default: "staging" # используется, если вызывающая сторона не передала значение
      test_var:
        type: boolean
        default: false
    outputs: # значения, которые reusable workflow возвращает вызывающему workflow
      build_message_out: # имя переменной
        description: "Example message generated by the reusable workflow"
        value: ${{ jobs.build_job.outputs.job_build_message_out }} # 3. задает значение output уровня workflow через output уровня job
      deployed_environment_out:
        description: "Environment used by the reusable workflow"
        value: ${{ jobs.build_job.outputs.job_deployed_environment_out }}
    secrets:
      npm_token_var:
        required: true
jobs:
  build_job:
    runs-on: ubuntu-latest
    outputs:
      job_build_message_out: ${{ steps.publish_outputs.outputs.build_message_out }} # 2. поднимает output шага на уровень job, чтобы его можно было использовать в output workflow
      job_deployed_environment_out: ${{ steps.publish_outputs.outputs.deployed_environment_out }} # publish_outputs — id шага, который формирует output
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version_var }} # использует значение входной переменной из вызывающего workflow
      - run: |
          echo "Node version input: ${{ inputs.node_version_var }}"
          echo "Workflow call is working"
          echo "Test variable input: ${{ inputs.test_var }}"
      - run: echo "Развертывание в ${{ inputs.environment_var }}"
      - id: publish_outputs
        run: |
          echo "build_message_out=Build completed with Node ${{ inputs.node_version_var }}" >> "$GITHUB_OUTPUT" # 1. создает output для job на основе входной переменной
          echo "deployed_environment_out=${{ inputs.environment_var }}" >> "$GITHUB_OUTPUT"