name: Get & Cache Dependencies
description: Get the dependencies and cache them for future runs.
runs: #
  using: "composite"
  steps:
    - name: Cache Dependencies
      id: cahce_dependencies
      uses: actions/cache@v3
      with:
        path: node_modules # Путь к папке с зависимостями, которую нужно кэшировать
        key: deps-node-modules-${{ hashFiles('**/package-lock.json') }} # Ключ кэша, основанный на хэше package-lock.json
    - name: Install Dependencies
      if: steps.cahce_dependencies.outputs.cache-hit != 'true' # Устанавливать зависимости только если кэш не найден
      shell: bash
      run: npm install # Команда для установки зависимостей, например, npm install для Node.js проектов