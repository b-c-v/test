name: Use GITHUB_TOKEN

on:
  push:

permissions: # global workflow-level permissions; can be overridden at the job level
  contents: read # can read the repo contents
  issues: write # can write to issues

jobs:
  show-token-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (actions/checkout uses GITHUB_TOKEN automatically)
        uses: actions/checkout@v4

      - name: Call the GitHub API with GITHUB_TOKEN passed as an env variable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api repos/${{ github.repository }} --jq '.full_name'

      - name: Comment on the PR using GITHUB_TOKEN (needs issues:write)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.push.number }} \
            --body "Hello from a workflow using GITHUB_TOKEN!"

  job-level-permissions:
    runs-on: ubuntu-latest
    permissions: # job-level permissions override the workflow-level block
      contents: read # can read the repo contents
      pull-requests: write # can write to pull requests
    steps:
      - name: Label the PR (job-level permissions override the workflow-level block)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.push.number }} --add-label "automated"
