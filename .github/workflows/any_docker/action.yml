name: "Simple Docker Action"
description: "Minimal Docker-based GitHub Action example"

inputs:
  who-to-greet_var: # Action input set by workflow 'with:'; this value is forwarded via runs.args[0] and read as $1 in the container command.
    description: "Name to greet"
    required: false
    default: "World"
  greeting-prefix_var: # Action input set by workflow 'with:'; this value is mapped to runs.env.GREETING_PREFIX_VAR and read as $GREETING_PREFIX_VAR in the container.
    description: "Greeting prefix"
    required: false
    default: "Hello"
  any_var: # Action input set by workflow 'with:'; if not mapped manually, the runner still exposes it automatically as INPUT_ANY_VAR inside the container.
    description: "Example input read via automatic INPUT_ prefix"
    required: false
    default: "default-from-input-prefix"

outputs:
  any_time_var:
    description: "Time when the action ran"

runs:
  using: "docker" # Declares a Docker action: the runner starts a container and then injects inputs through args/env for that container process.
  image: "Dockerfile" # Builds the local Dockerfile in this action folder; this image receives the args/env values defined below.
  args:
    - ${{ inputs.who-to-greet_var }} # Connects inputs.who-to-greet_var -> first positional argument ($1), linking workflow input to container command argument.
  env:
    GREETING_PREFIX_VAR: ${{ inputs.greeting-prefix_var }} # Connects inputs.greeting-prefix_var -> named environment variable, linking workflow input to container process environment.
