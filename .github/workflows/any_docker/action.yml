name: "Simple Docker Action"
description: "Minimal Docker-based GitHub Action example"

inputs:
  who-to-greet_var:
    description: "Name to greet"
    required: false
    default: "World"

outputs:
  any_time_var:
    description: "Time when the action ran"

runs:
  using: "docker" # Shows that this is a Docker action
  image: "Dockerfile" # Specifies the ./path/to/Dockerfile to use for building the image. Also can be a pre-built image from Docker Hub or GHCR.
  args:
    - ${{ inputs.who-to-greet_var }}
